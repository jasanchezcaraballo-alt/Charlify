<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Charlify - Aprende ingles gratis</title>
<meta name="theme-color" content="#07070e"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Charlify"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07070e;--s1:#0f0f1c;--s2:#161626;--s3:#1d1d30;
  --b:#252540;--txt:#f0f0ff;--mut:#58588a;--dim:#2e2e4a;
  --p:#5b21b6;--p2:#7c3aed;--p3:#8b5cf6;--p4:#a78bfa;
  --a2:#06b6d4;--a3:#22d3ee;
  --g2:#10b981;--r2:#ef4444;--o2:#f59e0b;--gld:#fbbf24;
  --fn:'Plus Jakarta Sans',sans-serif;--rd:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--fn);color:var(--txt);font-size:15px}
#root{height:100svh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;overflow:hidden}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes xf{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-55px)}}
.nav{display:flex;background:var(--s1);border-top:1px solid var(--b);flex-shrink:0}
.nb{flex:1;padding:8px 2px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--mut);font-family:var(--fn);cursor:pointer;font-size:10px;font-weight:700;transition:color .2s}
.nb.on{color:var(--p4)}
.nb-i{font-size:19px;line-height:1}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 15px 28px}
.sc::-webkit-scrollbar{display:none}
.tb{display:flex;justify-content:space-between;align-items:center;padding:16px 0 10px}
.logo em{font-style:normal;background:linear-gradient(120deg,var(--p3),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:var(--s1);border:2px solid var(--b);border-radius:var(--rd);padding:12px 13px;font-size:14px;font-weight:600;color:var(--txt);font-family:var(--fn);text-align:left;cursor:pointer;display:flex;align-items:center;gap:9px;width:100%}
.opt.ok{border-color:var(--g2);background:rgba(16,185,129,.07)}
.opt.bad{border-color:var(--r2);background:rgba(239,68,68,.06)}
.opt-lt{width:24px;height:24px;border-radius:6px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--mut);flex-shrink:0}
.opt.ok .opt-lt{background:var(--g2);color:#fff}
.opt.bad .opt-lt{background:var(--r2);color:#fff}
.szone{min-height:50px;background:var(--s1);border:2px dashed var(--b);border-radius:var(--rd);padding:8px 10px;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;align-items:center}
.szone.act{border-style:solid;border-color:var(--p3)}
.tl{background:var(--s2);border:1.5px solid var(--b);border-radius:8px;padding:6px 11px;font-size:13px;font-weight:700;cursor:pointer;user-select:none;color:var(--txt);font-family:var(--fn)}
.tl.placed{background:rgba(91,33,182,.18);border-color:var(--p3);color:var(--p4)}
.tbank{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.winp{width:100%;background:var(--s1);border:2px solid var(--b);border-radius:var(--rd);padding:12px;font-size:15px;font-weight:600;color:var(--txt);font-family:var(--fn);resize:none;outline:none;min-height:72px;line-height:1.4}
.winp:focus{border-color:var(--p3)}
.winp.ok{border-color:var(--g2)}
.winp.bad{border-color:var(--r2)}
.gc{background:linear-gradient(135deg,rgba(91,33,182,.09),rgba(6,182,212,.05));border:1px solid rgba(139,92,246,.2);border-radius:var(--rd);padding:13px;margin-bottom:13px}
.spk{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:5px 11px;font-size:11px;color:var(--txt);font-family:var(--fn);cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-bottom:11px}
.fbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:9px 13px 18px;z-index:100;background:var(--bg)}
.fbi{border-radius:var(--rd);padding:12px 13px;display:flex;align-items:flex-start;gap:9px;margin-bottom:8px}
.fbi.ok{background:rgba(4,120,87,.09);border:1.5px solid var(--g2)}
.fbi.bad{background:rgba(185,28,28,.07);border:1.5px solid var(--r2)}
.fbn{border:none;border-radius:10px;padding:9px 16px;font-size:13px;font-weight:800;font-family:var(--fn);cursor:pointer;white-space:nowrap}
.fbn.ok{background:var(--g2);color:#fff}
.fbn.bad{background:var(--r2);color:#fff}
.bp{width:100%;background:linear-gradient(135deg,var(--p),var(--p3));border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:800;color:#fff;font-family:var(--fn);cursor:pointer;margin-top:5px}
.bs{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:12px;padding:11px;font-size:13px;font-weight:700;color:var(--mut);font-family:var(--fn);cursor:pointer;margin-top:7px}
.xpp{position:fixed;pointer-events:none;font-size:12px;font-weight:900;color:var(--gld);z-index:999;animation:xf .85s ease forwards}
.vwrap{perspective:1000px;height:190px;cursor:pointer;margin-bottom:12px}
.vcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.vcard.flip{transform:rotateY(180deg)}
.vf,.vb{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;text-align:center}
.vf{background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--b)}
.vb{background:linear-gradient(135deg,rgba(91,33,182,.18),rgba(6,182,212,.1));border:1px solid rgba(139,92,246,.28);transform:rotateY(180deg)}
.ph-cats{display:flex;gap:7px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px}
.ph-cats::-webkit-scrollbar{display:none}
.phc{background:var(--s2);border:1px solid var(--b);border-radius:20px;padding:6px 13px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;font-family:var(--fn);color:var(--txt);flex-shrink:0}
.phc.on{background:linear-gradient(135deg,var(--p),var(--p3));border-color:transparent;color:#fff}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chd{padding:10px 13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--b);flex-shrink:0;background:var(--s1)}
.msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:11px 11px 5px;display:flex;flex-direction:column;gap:8px}
.msgs::-webkit-scrollbar{display:none}
.msg{display:flex;flex-direction:column;max-width:87%}
.msg.ai{align-self:flex-start}
.msg.me{align-self:flex-end}
.mbub{padding:10px 12px;border-radius:15px;font-size:14px;line-height:1.55}
.msg.ai .mbub{background:var(--s2);border:1px solid var(--b);border-bottom-left-radius:4px}
.msg.me .mbub{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-bottom-right-radius:4px}
.typing{display:flex;align-items:center;gap:4px;padding:10px 12px;background:var(--s2);border:1px solid var(--b);border-radius:15px;border-bottom-left-radius:4px;width:fit-content}
.dot{width:6px;height:6px;border-radius:50%;background:var(--mut);animation:blink 1.3s ease infinite}
.dot:nth-child(2){animation-delay:.22s}
.dot:nth-child(3){animation-delay:.44s}
.sugs{padding:5px 11px 3px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0}
.sugs::-webkit-scrollbar{display:none}
.sug{background:var(--s2);border:1px solid var(--b);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;font-family:var(--fn);color:var(--txt);flex-shrink:0}
.ir{padding:7px 10px 13px;display:flex;gap:7px;align-items:flex-end;flex-shrink:0;background:var(--bg);border-top:1px solid var(--b)}
.ci{flex:1;background:var(--s2);border:1.5px solid var(--b);border-radius:12px;padding:9px 12px;font-size:14px;color:var(--txt);font-family:var(--fn);resize:none;outline:none;max-height:95px;line-height:1.4}
.ci:focus{border-color:var(--p3)}
.ci::placeholder{color:var(--dim)}
.sb{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--p),var(--p3));border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lsn{flex:1;display:flex;flex-direction:column;overflow:hidden}
.lsn-top{padding:11px 14px 8px;display:flex;align-items:center;gap:9px;flex-shrink:0}
.lx{background:var(--s2);border:1px solid var(--b);border-radius:9px;padding:6px 11px;font-size:12px;color:var(--txt);font-family:var(--fn);cursor:pointer}
.pb{flex:1;height:8px;background:var(--s2);border-radius:99px;overflow:hidden}
.pf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--p),var(--p3));transition:width .5s}
.hts{display:flex;gap:3px;font-size:13px}
.exb{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 105px}
.exb::-webkit-scrollbar{display:none}
.ext{font-size:10px;font-weight:800;color:var(--a3);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.exq{font-size:20px;font-weight:900;line-height:1.3;margin-bottom:4px}
.exs{font-size:13px;color:var(--mut);margin-bottom:15px;line-height:1.5}
/* HEADER */
.hdr{padding:14px 15px 6px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr-logo h1{font-size:22px;font-weight:900;letter-spacing:-.5px;line-height:1.1}
.hdr-logo h1 span{color:var(--txt)}
.hdr-logo h1 em{font-style:normal;color:var(--a3)}
.hdr-logo p{font-size:11px;color:var(--mut);font-weight:600;margin-top:1px}
.hdr-stats{display:flex;gap:7px}
.stat-pill{background:var(--s2);border:1px solid var(--b);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:800;display:flex;align-items:center;gap:5px}
/* AI BANNER */
.ai-banner{margin:4px 15px 2px;border-radius:18px;padding:16px 18px;background:linear-gradient(135deg,rgba(91,33,182,.35),rgba(6,182,212,.12));border:1px solid rgba(139,92,246,.3);cursor:pointer}
.ai-banner-title{font-size:19px;font-weight:900;margin:6px 0 3px}
.ai-banner-sub{font-size:12px;color:var(--mut);margin-bottom:10px}
.ai-banner-tags{display:flex;gap:6px;flex-wrap:wrap}
.ai-tag{background:rgba(255,255,255,.07);border:1px solid var(--b);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700}
/* PATH */
.path-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.path-wrap::-webkit-scrollbar{display:none}
.sec-hdr{font-size:10px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:2px;padding:12px 15px 8px}
.path{position:relative;padding:0 15px 100px}
.path-line{position:absolute;left:48px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--p3),var(--dim));z-index:0}
.pi{display:flex;align-items:flex-start;gap:12px;margin-bottom:22px;position:relative;z-index:1}
.pi.r{flex-direction:row-reverse;text-align:right}
.pi-icon{width:62px;height:62px;border-radius:50%;background:var(--s2);border:2px solid var(--b);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;gap:2px}
.pi-icon span:first-child{font-size:22px;line-height:1}
.pi-badge{font-size:9px;font-weight:800;color:var(--mut);background:var(--s3);border-radius:4px;padding:1px 4px}
.pi-icon.on{border-color:var(--p3);box-shadow:0 0 18px rgba(139,92,246,.4);background:rgba(91,33,182,.12)}
.pi-icon.on .pi-badge{color:var(--p4);background:rgba(91,33,182,.25)}
.pi-icon.done{border-color:var(--g2);background:rgba(16,185,129,.08)}
.pi-icon.done .pi-badge{color:var(--g2)}
.pi-info{flex:1;padding-top:4px}
.pi-title{font-size:15px;font-weight:800;margin-bottom:2px}
.pi-sub{font-size:11px;color:var(--mut);margin-bottom:7px;line-height:1.4}
.pi-tags{display:flex;gap:6px;flex-wrap:wrap}
.pi.r .pi-tags{justify-content:flex-end}
.ptag{border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.ptag.on{background:rgba(91,33,182,.2);border:1px solid var(--p3);color:var(--p4)}
.ptag.done{background:rgba(16,185,129,.15);border:1px solid var(--g2);color:var(--g2)}
.ptag.lock{background:var(--s2);border:1px solid var(--b);color:var(--mut)}
.ptag.xp{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);color:var(--gld)}
/* THEORY SCREEN */
.thy{flex:1;display:flex;flex-direction:column;overflow:hidden}
.thy-top{padding:11px 14px 8px;display:flex;align-items:center;gap:9px;flex-shrink:0}
.thy-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 16px 110px}
.thy-body::-webkit-scrollbar{display:none}
.thy-tag{font-size:10px;font-weight:800;color:var(--a3);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.thy-title{font-size:23px;font-weight:900;line-height:1.25;margin-bottom:14px}
.thy-p{font-size:14px;line-height:1.65;color:var(--txt);margin-bottom:14px}
.thy-p b{color:var(--p4)}
.thy-box{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:14px 16px;margin-bottom:14px}
.thy-box-title{font-size:11px;font-weight:800;color:var(--gld);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.thy-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--b)}
.thy-row:last-child{border-bottom:none}
.thy-row-en{font-size:14px;font-weight:800;color:var(--p4);min-width:62px}
.thy-row-arrow{color:var(--dim);font-size:12px}
.thy-row-es{font-size:13px;color:var(--mut);flex:1}
.thy-ex{background:linear-gradient(135deg,rgba(91,33,182,.12),rgba(6,182,212,.06));border:1px solid rgba(139,92,246,.22);border-radius:12px;padding:11px 14px;margin-bottom:9px;font-size:13.5px;line-height:1.5}
.thy-ex b{color:var(--a3)}
.thy-ex span{display:block;color:var(--mut);font-size:12px;margin-top:3px}
.thy-tip{display:flex;gap:9px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.25);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.thy-tip-icon{font-size:18px;flex-shrink:0}
.thy-tip-text{font-size:13px;line-height:1.55;color:var(--txt)}
</style>
</head>

function getAIReply(msg) {
  var lo = msg.toLowerCase();
  for (var i = 0; i < AI_R.length; i++) {
    var r = AI_R[i];
    for (var j = 0; j < r.t.length; j++) {
      if (lo.indexOf(r.t[j]) !== -1) return r.r;
    }
  }
  var corrections = [];
  if (/\bi go\b/i.test(msg)) corrections.push("'I go' -> 'I went' (past tense)");
  if (/\bhe don't\b/i.test(msg)) corrections.push("'he don't' -> 'he doesn't'");
  if (/\bi am agree\b/i.test(msg)) corrections.push("'I am agree' -> 'I agree'");
  if (/\bmore better\b/i.test(msg)) corrections.push("'more better' -> 'better'");
  if (/\bshe go\b/i.test(msg)) corrections.push("'she go' -> 'she goes'");
  if (/\bno have\b/i.test(msg)) corrections.push("'no have' -> 'don't have'");
  if (/\bI can to\b/i.test(msg)) corrections.push("'I can to go' -> 'I can go'");
  if (/\bdepends of\b/i.test(msg)) corrections.push("'depends of' -> 'depends on'");
  var followUp = "";
  if (/\bwas\b|\bwere\b|\bwent\b|\bsaw\b|\bate\b|\bdid\b/i.test(msg)) {
    followUp = "Good past tense! Now try Present Perfect: 'I have seen / I have eaten...'";
  } else if (/\bwill\b|\bgoing to\b/i.test(msg)) {
    followUp = "Great future tense! WILL = spontaneous decisions, GOING TO = plans already decided.";
  } else if (/\bam\b|\bis\b|\bare\b/i.test(msg)) {
    followUp = "Good use of TO BE! Try making it negative or a question.";
  } else if (msg.length > 40) {
    followUp = "Excellent! Expand it - add when, where, or how.";
  } else {
    followUp = "Good! Write a longer sentence using more vocabulary.";
  }
  if (corrections.length > 0) {
    var reply = "Things to improve:\n\n";
    for (var k=0;k<corrections.length;k++) reply += "📝 " + corrections[k] + "\n";
    reply += "\n" + followUp;
    return reply;
  }
  return followUp;
}

function mk(tag, at) {
  var el = document.createElement(tag);
  var kids = Array.prototype.slice.call(arguments, 2);
  if (at) {
    var keys = Object.keys(at);
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i], v = at[k];
      if (k === "cls") el.className = v;
      else if (k === "html") el.innerHTML = v;
      else if (k.indexOf("on") === 0 && typeof v === "function") el[k] = v;
      else el.setAttribute(k, v);
    }
  }
  for (var i = 0; i < kids.length; i++) {
    var c = kids[i];
    if (c == null) continue;
    if (Array.isArray(c)) { for (var j = 0; j < c.length; j++) if (c[j] != null) el.appendChild(typeof c[j] === "string" ? document.createTextNode(c[j]) : c[j]); }
    else el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  }
  return el;
}

function speak(t) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(t);
  u.lang = "en-US"; u.rate = 0.9;
  speechSynthesis.speak(u);
}

function rEx() {
  var ex = S.exList[S.exIdx];
  var prog = (S.exIdx / S.exList.length) * 100;
  var wrap = mk("div",{cls:"lsn"});

  wrap.appendChild(mk("div",{cls:"lsn-top"},
    mk("button",{cls:"lx",onclick:function(){S.lPhase="list";render();}},"✕"),
    mk("div",{cls:"pb"},mk("div",{cls:"pf",style:"width:"+prog+"%"})),
    mk("div",{cls:"hts"},"❤️❤️❤️")
  ));

  var body = mk("div",{cls:"exb"});
  body.appendChild(mk("div",{cls:"ext"},ex.tag));
  body.appendChild(mk("div",{cls:"exq"},ex.q));
  if (ex.sentence) body.appendChild(mk("div",{cls:"exs"},ex.sentence));

  if (ex.type === "mc") {
    var opts = mk("div",{cls:"opts"});
    for (var i = 0; i < ex.opts.length; i++) {
      (function(o, i){
        var c = "opt";
        if (S.exAns) { if (i===ex.ans) c+=" ok"; else if (i===S.exSel) c+=" bad"; }
        else if (i===S.exSel) c+=" ok";
        opts.appendChild(mk("button",{cls:c, onclick:function(){if(S.exAns)return;S.exSel=i;render();}},
          mk("span",{cls:"opt-lt"},["A","B","C","D"][i]), o
        ));
      })(ex.opts[i], i);
    }
    body.appendChild(opts);
  } else if (ex.type === "fill") {
    var c = "winp"; if (S.exAns) c += S.exOk?" ok":" bad";
    var inp = mk("textarea",{cls:c, placeholder:"Escribe tu respuesta..."});
    inp.value = S.exFill;
    inp.oninput = function(e){
      S.exFill = e.target.value;
      var b = root.querySelector(".fbar button.verify-btn");
      if (b) {
        var d = !S.exFill.trim();
        b.disabled = d;
        b.style.opacity = d ? ".4" : "1";
      }
    };
    body.appendChild(inp);
  } else {
    if (S.exIdx !== S._oi) {
      S._oi = S.exIdx;
      S.exBank = ex.words.slice().sort(function(){return Math.random()-.5;});
      S.exOrd = [];
    }
    var zone = mk("div",{cls:"szone"+(S.exOrd.length?" act":"")});
    if (!S.exOrd.length) zone.appendChild(mk("span",{style:"color:var(--dim);font-size:13px"},"Toca las palabras de abajo..."));
    for (var i = 0; i < S.exOrd.length; i++) {
      (function(w,i){
        zone.appendChild(mk("button",{cls:"tl placed",onclick:function(){if(S.exAns)return;S.exBank.push(w);S.exOrd.splice(i,1);render();}},w));
      })(S.exOrd[i],i);
    }
    body.appendChild(zone);
    var bank = mk("div",{cls:"tbank"});
    for (var i = 0; i < S.exBank.length; i++) {
      (function(w,i){
        bank.appendChild(mk("button",{cls:"tl",onclick:function(){if(S.exAns)return;S.exOrd.push(w);S.exBank.splice(i,1);render();}},w));
      })(S.exBank[i],i);
    }
    body.appendChild(bank);
  }

  wrap.appendChild(body);

  var fbar = mk("div",{cls:"fbar"});
  if (S.exAns) {
    var next = mk("button",{cls:"fbn "+(S.exOk?"ok":"bad"), onclick:function(){
      S.exAns=false;S.exSel=null;S.exFill="";
      if(S.exIdx+1>=S.exList.length) S.lPhase="result";
      else S.exIdx++;
      render();
    }}, S.exIdx+1>=S.exList.length ? "Ver resultado →" : "Continuar →");

    var correctAnswerText = ex.opts ? ex.opts[ex.ans] : ex.ans;
    var fbiContent;
    if (S.exOk) {
      fbiContent = mk("div",{style:"flex:1;font-size:13px;font-weight:700;color:var(--g2)"}, "¡Correcto! Bien hecho.");
    } else {
      var yourAnswer = ex.type==="mc" ? (S.exSel!=null?ex.opts[S.exSel]:"(sin responder)")
                      : ex.type==="fill" ? (S.exFill.trim()||"(sin responder)")
                      : (S.exOrd.join(" ")||"(sin responder)");
      fbiContent = mk("div",{style:"flex:1"},
        mk("div",{style:"font-size:13px;font-weight:700;color:var(--r2);margin-bottom:3px"}, "Tu respuesta: "+yourAnswer),
        mk("div",{style:"font-size:13px;font-weight:700;color:var(--g2)"}, "Correcto: "+correctAnswerText)
      );
    }

    fbar.appendChild(mk("div",{cls:"fbi "+(S.exOk?"ok":"bad")},
      mk("span",{style:"font-size:18px"},S.exOk?"✅":"❌"),
      fbiContent,
      next
    ));
  } else {
    var dis = ex.type==="mc" ? S.exSel===null : ex.type==="fill" ? !S.exFill.trim() : !S.exOrd.length;
    var btn = mk("button",{
      cls:"verify-btn",
      style:"width:100%;background:linear-gradient(135deg,var(--p),var(--p3));border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:800;color:#fff;font-family:var(--fn);cursor:pointer;opacity:"+(dis?".4":"1"),
      onclick:function(){
        var curDis = ex.type==="mc" ? S.exSel===null : ex.type==="fill" ? !S.exFill.trim() : !S.exOrd.length;
        if(curDis)return;
        var ok=false;
        if(ex.type==="mc") ok=S.exSel===ex.ans;
        if(ex.type==="fill") ok=S.exFill.trim().toLowerCase()===ex.ans.toLowerCase();
        if(ex.type==="order") ok=S.exOrd.join(" ")===ex.ans;
        S.exAns=true; S.exOk=ok;
        if(ok){S.xp+=ex.xp;S.exScore++;svXP();xpPop(ex.xp,btn);}
        render();
      }
    },"Verificar respuesta");
    fbar.appendChild(btn);
  }
  wrap.appendChild(fbar);
  return wrap;
}

  sc.appendChild(mk("div",{style:"font-size:72px;margin-bottom:16px"},"🎉"));
  sc.appendChild(mk("div",{style:"font-size:24px;font-weight:900;margin-bottom:8px"},"¡Leccion completa!"));
  sc.appendChild(mk("div",{style:"font-size:14px;color:var(--mut);margin-bottom:24px"},S.exScore+"/"+S.exList.length+" correctas"));
  sc.appendChild(mk("div",{style:"font-size:22px;color:var(--gld);font-weight:900;margin-bottom:28px"},"+"+S.exScore*22+" XP ⚡"));
  sc.appendChild(mk("button",{cls:"bp",style:"max-width:260px",onclick:function(){S.lPhase="list";render();}},"Volver a lecciones"));
  return sc;
}

function rVocab() {
  var w = VOCAB[S.vIdx];
  var l = S.vLearned;
  var pct = (l.length / VOCAB.length) * 100;
  return mk("div",{cls:"sc"},
    mk("div",{cls:"tb"},
      mk("div",{cls:"logo"},mk("em",{},"Vocabulario")),
      mk("div",{style:"font-size:12px;color:var(--mut);font-weight:700"},l.length+"/"+VOCAB.length+" aprendidas")
    ),
    mk("div",{style:"height:6px;background:var(--s2);border-radius:99px;overflow:hidden;margin-bottom:16px"},
      mk("div",{style:"height:100%;width:"+pct+"%;background:linear-gradient(90deg,var(--p),var(--p3));border-radius:99px"})
    ),
    mk("div",{cls:"vwrap",onclick:function(){S.vFlip=!S.vFlip;render();}},
      mk("div",{cls:"vcard"+(S.vFlip?" flip":"")},
        mk("div",{cls:"vf"},
          mk("div",{style:"font-size:11px;color:var(--a3);font-weight:800;margin-bottom:8px;text-transform:uppercase;letter-spacing:2px"},w.cat),
          mk("div",{style:"font-size:34px;font-weight:900;margin-bottom:6px"},w.en),
          mk("div",{style:"font-size:14px;color:var(--mut);margin-bottom:8px"},w.ph),
          mk("button",{cls:"spk",onclick:function(e){e.stopPropagation();speak(w.en);}},"🔊 Escuchar"),
          mk("div",{style:"font-size:11px;color:var(--dim)"},"Toca para ver la traduccion →")
        ),
        mk("div",{cls:"vb"},
          mk("div",{style:"font-size:14px;color:var(--mut);margin-bottom:10px"},"Traduccion"),
          mk("div",{style:"font-size:28px;font-weight:900;margin-bottom:12px"},w.es),
          mk("div",{cls:"gc",style:"font-size:13px;font-style:italic;color:var(--mut)"},'"'+w.ex+'"'),
          mk("button",{cls:"spk",onclick:function(e){e.stopPropagation();speak(w.ex);}},"🔊 Ejemplo")
        )
      )
    ),
    mk("div",{style:"display:flex;gap:8px;margin-bottom:16px"},
      mk("button",{cls:"bs",style:"flex:1",onclick:function(){S.vIdx=Math.max(0,S.vIdx-1);S.vFlip=false;render();}},"← Anterior"),
      mk("button",{cls:"bp",style:"flex:1;margin:0",onclick:function(){
        if(l.indexOf(S.vIdx)===-1){S.vLearned.push(S.vIdx);svVL();}
        S.vIdx=Math.min(VOCAB.length-1,S.vIdx+1);S.vFlip=false;render();
      }},l.indexOf(S.vIdx)!==-1?"Siguiente →":"Aprendida ✓")
    ),
    VOCAB.map(function(ww,i){
      return mk("div",{
        style:"background:"+(i===S.vIdx?"rgba(91,33,182,.15)":"var(--s1)")+";border:1px solid "+(i===S.vIdx?"var(--p3)":"var(--b)")+";border-radius:12px;padding:10px 14px;margin-bottom:7px;cursor:pointer;display:flex;justify-content:space-between;align-items:center",
        onclick:function(){S.vIdx=i;S.vFlip=false;render();}
      },
        mk("div",{},
          mk("div",{style:"font-size:14px;font-weight:800"},ww.en),
          mk("div",{style:"font-size:11px;color:var(--mut)"},ww.ph)
        ),
        mk("span",{style:"font-size:16px"},l.indexOf(i)!==-1?"✅":"📖")
      );
    })
  );
}

function rPhrases() {
  var cats = ["All"];
  for (var i = 0; i < PHRASES.length; i++) { if (cats.indexOf(PHRASES[i].cat)===-1) cats.push(PHRASES[i].cat); }
  var filtered = S.pCat==="All" ? PHRASES : PHRASES.filter(function(p){return p.cat===S.pCat;});
  var catBtns = cats.map(function(c){
    return mk("button",{cls:"phc"+(S.pCat===c?" on":""),onclick:function(){S.pCat=c;S.pOpen=null;render();}},c);
  });
  var cards = filtered.map(function(p,i){
    var open = S.pOpen===i;
    var card = mk("div",{
      style:"background:var(--s1);border:1px solid "+(open?"var(--p3)":"var(--b)")+";border-radius:14px;padding:14px;margin-bottom:9px;cursor:pointer",
      onclick:function(){S.pOpen=open?null:i;render();}
    },
      mk("div",{style:"display:flex;justify-content:space-between;align-items:center"},
        mk("div",{style:"font-size:15px;font-weight:800"},p.phrase),
        mk("span",{style:"background:var(--s3);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:800;color:var(--p4)"},p.lvl)
      )
    );
    if (open) {
      card.appendChild(mk("div",{style:"margin-top:10px"},
        mk("div",{style:"font-size:13px;color:var(--a3);margin-bottom:8px"},p.meaning),
        mk("div",{cls:"gc",style:"font-size:13px;font-style:italic;color:var(--mut)"},'"'+p.ex+'"'),
        mk("button",{cls:"spk",onclick:function(e){e.stopPropagation();speak(p.phrase);}},"🔊 Escuchar")
      ));
    }
    return card;
  });
  return mk("div",{cls:"sc"},
    mk("div",{cls:"tb"},mk("div",{cls:"logo"},mk("em",{},"Frases y Modismos"))),
    mk("div",{cls:"ph-cats"},catBtns),
    cards
  );
}

// ── AUDIO HELPERS ─────────────────────────────────────────────────────────────
var aiRecognizing = false;
var aiRecognition = null;

function speakAI(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  var plain = text.replace(/<[^>]*>/g,"").replace(/\n/g," ");
  var u = new SpeechSynthesisUtterance(plain);
  u.lang = "en-US"; u.rate = 0.88; u.pitch = 1;
  // pick a nice English voice if available
  var voices = speechSynthesis.getVoices();
  var pref = voices.find(function(v){return v.lang==="en-US" && v.name.toLowerCase().indexOf("google")!==-1;})
           || voices.find(function(v){return v.lang==="en-US";})
           || voices.find(function(v){return v.lang.startsWith("en");});
  if (pref) u.voice = pref;
  speechSynthesis.speak(u);
}

function startMic(inp, sb) {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { alert("Tu navegador no soporta reconocimiento de voz. Usa Chrome."); return; }
  if (aiRecognizing && aiRecognition) { aiRecognition.stop(); return; }
  aiRecognition = new SpeechRecognition();
  aiRecognition.lang = "en-US";
  aiRecognition.interimResults = false;
  aiRecognition.maxAlternatives = 1;
  aiRecognizing = true;
  sb.textContent = "🔴";
  sb.style.background = "var(--r2)";
  aiRecognition.onresult = function(e) {
    var transcript = e.results[0][0].transcript;
    inp.value = transcript;
    aiRecognizing = false;
    sb.textContent = "🎤";
    sb.style.background = "linear-gradient(135deg,var(--p),var(--p3))";
    sendAI(transcript);
  };
  aiRecognition.onerror = function() {
    aiRecognizing = false;
    sb.textContent = "🎤";
    sb.style.background = "linear-gradient(135deg,var(--p),var(--p3))";
  };
  aiRecognition.onend = function() {
    aiRecognizing = false;
    sb.textContent = "🎤";
    sb.style.background = "linear-gradient(135deg,var(--p),var(--p3))";
  };
  aiRecognition.start();
}

function rAI() {
  if (!S.aiMsgs.length) {
    var welcome = "Hello! I am Charlify, your AI English tutor.\n\nYou can write OR tap the microphone to speak in English and I will correct your grammar and reply with audio!\n\nWhat do you want to practice today?";
    S.aiMsgs = [{role:"ai",text:welcome,time:now(),speak:true}];
  }
  var sugs = ["Explain To Be","Past Simple help","Future with Will","Correct my English","Talk about travel"];
  var wrap = mk("div",{cls:"chat-wrap"});

  // header
  wrap.appendChild(mk("div",{cls:"chd"},
    mk("div",{style:"width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--p3));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0"},"🤖"),
    mk("div",{style:"flex:1"},
      mk("div",{style:"font-size:13px;font-weight:800"},"Tutor IA"),
      mk("div",{style:"font-size:10px;color:var(--g2);font-weight:700"},"● Online · Voz + Texto · Correcciones activas")
    ),
    mk("button",{
      style:"background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--txt);font-family:var(--fn);cursor:pointer;flex-shrink:0",
      onclick:function(){speechSynthesis&&speechSynthesis.cancel();}
    },"⏹ Stop")
  ));

  // messages
  var msgs = mk("div",{cls:"msgs"});
  for (var i = 0; i < S.aiMsgs.length; i++) {
    (function(m){
      var msg = mk("div",{cls:"msg "+m.role});
      var bub = mk("div",{cls:"mbub"});
      bub.innerHTML = m.text.replace(/\n/g,"<br>");
      msg.appendChild(bub);
      if (m.role === "ai") {
        var playBtn = mk("button",{
          style:"margin-top:5px;background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--txt);font-family:var(--fn);cursor:pointer;display:inline-flex;align-items:center;gap:4px",
          onclick:function(){speakAI(m.text);}
        },"🔊 Escuchar");
        msg.appendChild(playBtn);
      }
      msgs.appendChild(msg);
    })(S.aiMsgs[i]);
  }
  if (S.aiTyping) {
    msgs.appendChild(mk("div",{cls:"msg ai"},mk("div",{cls:"typing"},mk("div",{cls:"dot"}),mk("div",{cls:"dot"}),mk("div",{cls:"dot"}))));
  }
  wrap.appendChild(msgs);

  // suggestions
  wrap.appendChild(mk("div",{cls:"sugs"},sugs.map(function(s){
    return mk("button",{cls:"sug",onclick:function(){sendAI(s);}},s);
  })));

  // input row with mic + send
  var inp = mk("textarea",{cls:"ci",placeholder:"Escribe o toca el microfono...",rows:"1"});
  inp.addEventListener("input",function(){inp.style.height="auto";inp.style.height=Math.min(inp.scrollHeight,95)+"px";});
  inp.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendAI(inp.value);}});

  var micBtn = mk("button",{
    style:"width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--p),var(--p3));border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0",
    onclick:function(){startMic(inp, micBtn);}
  },"🎤");

  var sendBtn = mk("button",{
    cls:"sb",
    onclick:function(){sendAI(inp.value);}
  },"➤");

  wrap.appendChild(mk("div",{cls:"ir"},inp,micBtn,sendBtn));
  return wrap;
}

function sendAI(text) {
  var msg = text.trim();
  if (!msg) return;
  S.aiMsgs.push({role:"me",text:msg,time:now()});
  S.aiTyping = true;
  render();
  setTimeout(function(){
    var reply = getAIReply(msg);
    S.aiMsgs.push({role:"ai",text:reply,time:now(),speak:true});
    S.aiTyping = false;
    render();
    // auto-speak the AI reply
    setTimeout(function(){ speakAI(reply); }, 100);
  }, 900 + Math.random()*700);
}

render();
</script>
